<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Beghou Product Revenue Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI",sans-serif;background:#f7f8fc;min-height:100vh;color:#374151}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
.header{background:#020434;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{color:#fff;font-size:20px;font-weight:800;letter-spacing:-0.02em}
.header-sub{color:#EDF0FA;font-size:11px;opacity:0.4;margin-top:2px}
.header-eyebrow{color:#EDF0FA;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;opacity:.5}
.header-kpis{display:flex;gap:8px;flex-wrap:wrap}
.header-kpi{background:rgba(237,240,250,.07);border-radius:10px;padding:8px 16px;text-align:center;min-width:110px}
.header-kpi-label{color:#EDF0FA;font-size:9px;opacity:.45;letter-spacing:.08em;text-transform:uppercase}
.header-kpi-val{color:#E60F65;font-size:17px;font-weight:800}
.header-kpi-sub{color:#EDF0FA;font-size:9px;opacity:.3;margin-top:1px}
.main{padding:20px 28px;max-width:1600px;margin:0 auto}
.filter-bar{background:#fff;border-radius:14px;padding:14px 20px;border:1px solid #e8eaf0;box-shadow:0 1px 3px rgba(2,4,52,.05);display:flex;flex-wrap:wrap;gap:10px 20px;align-items:flex-start;margin-bottom:20px}
.filter-section{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding-right:5px;margin-right:2px;white-space:nowrap;padding-top:5px}
.filter-pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;transition:all .12s;white-space:nowrap}
.pill:hover{opacity:.85}
.divider{width:1px;background:#e8eaf0;align-self:stretch;flex-shrink:0;margin:0 4px}
.pipe-ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pipe-label{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#d97706;white-space:nowrap;padding-right:5px;border-right:2px solid #d9770644;margin-right:2px}
.pipe-pct-wrap{display:flex;align-items:center;gap:8px}
.pipe-pct-val{font-size:16px;font-weight:800;color:#d97706;min-width:42px;text-align:right}
input[type=range]{-webkit-appearance:none;width:140px;height:4px;border-radius:2px;background:linear-gradient(to right,#d97706 0%,#d97706 30%,#e5e7eb 30%,#e5e7eb 100%);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#d97706;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer}
input[type=number]{width:56px;padding:4px 8px;border-radius:8px;border:1.5px solid #fde68a;background:#fffbeb;color:#92400e;font-size:13px;font-weight:800;text-align:center;outline:none}
input[type=number]:focus{border-color:#d97706}
.tabs{display:flex;border-bottom:1px solid #e8eaf0;margin-bottom:20px}
.tab{padding:9px 20px;border:none;background:none;font-weight:700;font-size:13px;color:#9ca3af;border-bottom:2px solid transparent;transition:all .12s}
.tab.active{color:#020434;border-bottom-color:#E60F65}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:18px 22px;border:1px solid #e8eaf0;box-shadow:0 1px 3px rgba(2,4,52,.06);border-top:3px solid #E60F65}
.kpi-label{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:800;color:#020434;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.card{background:#fff;border-radius:14px;border:1px solid #e8eaf0;box-shadow:0 1px 4px rgba(2,4,52,.04);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px 12px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:800;color:#020434}
.card-sub{font-size:11px;color:#9ca3af;margin-top:2px}
.chart-wrap{padding:16px 16px 6px;overflow:hidden;position:relative}
canvas{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:1}
th{padding:10px 13px;font-size:10px;font-weight:800;color:#9ca3af;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid #e8eaf0;background:#fafbff;cursor:pointer;user-select:none;white-space:nowrap}
th.active{color:#020434;background:#f8f9ff}
td{padding:9px 13px;border-bottom:1px solid #f3f4f6;color:#374151}
tr:nth-child(even){background:#fafbff}
tr:hover td{background:#f0f4ff}
.dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:7px;vertical-align:middle;flex-shrink:0}
.no-product{background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700}
.fallback-tag{background:#e0f2fe;color:#0369a1;border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:5px;vertical-align:middle}
.pipe-tag{background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:5px;vertical-align:middle}
.pos{color:#00875A;font-weight:700}
.neg{color:#EF4444;font-weight:700}
.new-tag{color:#9ca3af}
.dash{color:#d1d5db}
.search-input{padding:7px 14px;border-radius:8px;border:1.5px solid #e8eaf0;font-size:12px;outline:none;width:240px;color:#374151}
.search-input:focus{border-color:#020434}
.table-scroll{overflow-x:auto;max-height:600px;overflow-y:auto}
.insights{background:#020434;border-radius:14px;overflow:hidden;margin-bottom:20px}
.insights-toggle{width:100%;background:none;border:none;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;color:#fff}
.insights-toggle span{font-weight:800;font-size:14px}
.insights-grid{padding:0 22px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.insight-card{background:rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;border:1px solid rgba(255,255,255,.08)}
.insight-icon{font-size:18px;margin-bottom:6px}
.insight-title{color:#E60F65;font-weight:800;font-size:12px;margin-bottom:5px}
.insight-body{color:#EDF0FA;font-size:11px;line-height:1.6;opacity:.72}
.legend-wrap{display:flex;flex-wrap:wrap;gap:6px 14px;padding:10px 16px 16px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#374151;font-weight:600}
.untagged-banner{background:#fff;border-radius:14px;border:2px solid #F59E0B;overflow:hidden;margin-bottom:20px}
.untagged-header{padding:16px 20px;background:#fffbeb;border-bottom:1px solid #fef3c7;display:flex;gap:12px;align-items:center}
.untagged-body{padding:14px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.untagged-yr{background:#fffbeb;border-radius:10px;padding:14px 16px;border:1px solid #fef3c7}
</style>

function fmt(n){if(!n)return"$0";if(n>=1e9)return"$"+(n/1e9).toFixed(1)+"B";if(n>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"K";return"$"+n.toFixed(0)}

function productGroup(p){if(!p)return"";const b=p.includes(":")?p.split(":")[0].trim():p;if(b.toUpperCase()==="ARC IC OPERATIONS")return"Arc IC Operations";return b}

    const key=r.year+"-Q"+r.quarter;
    const g=productGroup(r.product);
    if(!execMap[key])execMap[key]={};
    execMap[key][g]=(execMap[key][g]||0)+getVal(r,state.metric);
  }
  // Pipeline bars keyed by year
  const pipeMap={};
  for(const r of pipe){
    if(!r.product)continue;
    const key=r.year+" Pipeline";
    const g=productGroup(r.product);
    if(!pipeMap[key])pipeMap[key]={};
    pipeMap[key][g]=(pipeMap[key][g]||0)+getVal(r,state.metric)*pct;
  }
  // Unweighted pipeline totals for KPIs
  const pipeRaw={};
  for(const r of pipe){
    pipeRaw[r.year]=(pipeRaw[r.year]||0)+getVal(r,state.metric);
  }
  return{execMap,pipeMap,pipeRaw};
}

function drawChart(canvas,exec,pipe){
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.offsetWidth||canvas.offsetWidth;
  const H=420;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);

  const {execMap,pipeMap}=buildChartData(exec,pipe);
  const pct=state.pipelinePct/100;

  // Build bar list: 8 quarterly exec bars + 2026/2027 pipeline bars
  // Only show quarters that have data
  const allExecKeys=EXEC_QS.filter(k=>execMap[k]&&Object.values(execMap[k]).some(v=>v>0));
  // Always show pipeline bars if pipeline data exists
  const pipeKeys=["2026"].filter(y=>getPipe().some(r=>r.year===y));
  const bars=[
    ...allExecKeys.map(k=>({key:k,label:k,isPipe:false,data:execMap[k]||{}})),
    ...pipeKeys.map(y=>({key:y+" Pipeline",label:y+"\nPipeline",isPipe:true,data:pipeMap[y+" Pipeline"]||{}}))
  ];

  if(!bars.length)return;

  const pad={top:28,right:16,bottom:56,left:72};
  const chartW=W-pad.left-pad.right;
  const chartH=H-pad.top-pad.bottom;

  // Compute max
  let maxVal=0;
  bars.forEach(b=>{maxVal=Math.max(maxVal,Object.values(b.data).reduce((s,v)=>s+v,0));});
  maxVal=maxVal*1.1||1;

  const gap=4;
  const groupGap=10;
  // Group exec bars by year pair, then pipeline
  const numGroupGaps=bars.length>0?([...new Set(bars.map(b=>b.key.split("-")[0].split(" ")[0]))].length-1+pipeKeys.length):0;
  const availW=chartW-gap*(bars.length-1)-groupGap*numGroupGaps;
  const barW=Math.max(18,Math.floor(availW/bars.length));
  const totalBarsW=bars.length*barW+(bars.length-1)*gap+groupGap*numGroupGaps;
  // Insert extra gap between year groups and before pipeline
  const yearGroups=[["2025-Q1","2025-Q2","2025-Q3","2025-Q4"],["2026-Q1","2026-Q2","2026-Q3","2026-Q4"]];
  
  // Calculate x positions with year-group gaps
  const xPositions=[];
  let xCursor=pad.left+(chartW-totalBarsW)/2;
  let lastYear="";
  bars.forEach((b,i)=>{
    const yr=b.key.split("-")[0].split(" ")[0];
    if(i>0&&yr!==lastYear){xCursor+=groupGap;}
    xPositions.push(xCursor);
    xCursor+=barW+gap;
    lastYear=yr;
  });

  // Grid lines
  const ticks=5;
  ctx.strokeStyle="#f0f0f5";ctx.lineWidth=1;
  for(let i=0;i<=ticks;i++){
    const y=pad.top+chartH-(chartH*i/ticks);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
    ctx.fillStyle="#9ca3af";ctx.font=`10px -apple-system,sans-serif`;ctx.textAlign="right";
    ctx.fillText(fmt(maxVal*i/ticks),pad.left-6,y+3);
  }

  // Y axis
  ctx.strokeStyle="#e8eaf0";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.left,pad.top);ctx.lineTo(pad.left,pad.top+chartH);ctx.stroke();

  // Year group separators and labels
  const yearLabelPositions={};
  bars.forEach((b,i)=>{
    const yr=b.isPipe?null:b.key.split("-")[0];
    if(yr){
      if(!yearLabelPositions[yr])yearLabelPositions[yr]={start:xPositions[i],end:xPositions[i]+barW};
      else yearLabelPositions[yr].end=xPositions[i]+barW;
    }
  });
  Object.entries(yearLabelPositions).forEach(([yr,{start,end}])=>{
    const cx=(start+end)/2;
    ctx.fillStyle="#020434";ctx.font=`bold 12px -apple-system,sans-serif`;ctx.textAlign="center";
    ctx.fillText(yr,cx,pad.top+chartH+44);
    // subtle bracket line
    ctx.strokeStyle="#e8eaf0";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(start,pad.top+chartH+32);ctx.lineTo(end,pad.top+chartH+32);ctx.stroke();
  });

  // Draw bars
  bars.forEach((b,i)=>{
    const x=xPositions[i];
    let baseY=pad.top+chartH;
    const segs=[];
    let other=0;
    for(const [p,v] of Object.entries(b.data)){
      if(v<=0)continue;
      if(TOP_PRODUCTS.includes(p))segs.push({name:p,val:v,col:PRODUCT_COLORS[p]||"#CBD5E1"});
      else other+=v;
    }
    if(other>0)segs.push({name:"Other",val:other,col:"#CBD5E1"});
    const total=segs.reduce((s,x)=>s+x.val,0);

    segs.forEach(seg=>{
      const h=(seg.val/maxVal)*chartH;
      if(b.isPipe){
        // Hatched / semi-transparent for pipeline
        ctx.save();
        ctx.globalAlpha=0.55;
        ctx.fillStyle=seg.col;
        ctx.fillRect(x,baseY-h,barW,h);
        ctx.globalAlpha=1;
        // Hatch pattern
        ctx.strokeStyle=hexToRgba(seg.col,0.3);ctx.lineWidth=1.5;
        ctx.save();ctx.beginPath();ctx.rect(x,baseY-h,barW,h);ctx.clip();
        for(let hx=x-h;hx<x+barW+h;hx+=6){
          ctx.beginPath();ctx.moveTo(hx,baseY);ctx.lineTo(hx+h,baseY-h);ctx.stroke();
        }
        ctx.restore();ctx.restore();
        // Dashed border
        ctx.save();ctx.setLineDash([3,3]);ctx.strokeStyle=seg.col;ctx.lineWidth=1;
        ctx.strokeRect(x,baseY-h,barW,h);ctx.setLineDash([]);ctx.restore();
      } else {
        ctx.fillStyle=seg.col;
        ctx.fillRect(x,baseY-h,barW,h);
      }
      baseY-=h;
    });

    // Total label above bar
    if(total>0){
      ctx.save();
      ctx.fillStyle=b.isPipe?"#d97706":"#020434";
      ctx.font=`bold 9px -apple-system,sans-serif`;
      ctx.textAlign="center";
      const labelY=pad.top+chartH-(total/maxVal)*chartH-4;
      ctx.fillText(fmt(total),x+barW/2,labelY);
      ctx.restore();
    }

    // X label
    ctx.fillStyle=b.isPipe?"#d97706":"#374151";
    ctx.font=b.isPipe?`bold 10px -apple-system,sans-serif`:`10px -apple-system,sans-serif`;
    ctx.textAlign="center";
    if(b.isPipe){
      ctx.fillText(b.key.split(" ")[0],x+barW/2,pad.top+chartH+16);
      ctx.fillText("Pipeline",x+barW/2,pad.top+chartH+27);
    } else {
      ctx.fillText("Q"+b.key.split("-Q")[1],x+barW/2,pad.top+chartH+16);
    }
  });

  // Pipeline % annotation
  if(pipeKeys.length>0){
    ctx.save();
    ctx.fillStyle="#d97706";ctx.font=`10px -apple-system,sans-serif`;ctx.textAlign="left";
    ctx.fillText(`Pipeline weighted at ${state.pipelinePct}%`,pad.left+2,pad.top+14);
    ctx.restore();
  }
}

function makePill(label,active,scheme,onClick){
  const c=FILTER_COLORS[scheme];
  const p=el("button",{cls:"pill",onClick});
  p.textContent=label;
  if(active){p.style.background=c.a;p.style.color=c.t;p.style.borderColor=c.a;}
  return p;
}
function makeFilterSection(label,color,pills){
  const wrap=el("div",{cls:"filter-section"});
  const lbl=el("div",{cls:"filter-label"});
  lbl.textContent=label;lbl.style.color=FILTER_COLORS[color].a;
  lbl.style.borderRight="2px solid "+FILTER_COLORS[color].a+"44";
  const pw=el("div",{cls:"filter-pills"});
  pills.forEach(p=>pw.appendChild(p));
  wrap.appendChild(lbl);wrap.appendChild(pw);
  return wrap;
}

    srch.addEventListener("input",e=>setState({dealSearch:e.target.value}));
    dHdr.appendChild(dHdrLeft);dHdr.appendChild(srch);dcard.appendChild(dHdr);
    const dscroll=el("div",{cls:"table-scroll"});
    const dtbl=el("table");
    const dthead=el("thead");const dhrow=el("tr");
    [["company","Company","left"],["dealName","Deal Name","left"],["year","Yr","right"],["product","Product","left"],["stage","Stage","left"],["startDate","Start Date","right"],["tcv","TCV","right"],["inyr","In-Yr Rev","right"]].forEach(([c,l,align])=>{
      const th=el("th",{cls:ds.col===c?"active":""});th.style.textAlign=align;if(align==="left")th.style.paddingLeft="13px";
      th.innerHTML=l+(ds.col===c?(ds.dir==="asc"?" ↑":" ↓"):"");
      th.addEventListener("click",()=>setState({dealSort:{col:c,dir:ds.col===c&&ds.dir==="desc"?"asc":"desc"}}));
      dhrow.appendChild(th);
    });
    dthead.appendChild(dhrow);dtbl.appendChild(dthead);
    const dtbody=el("tbody");
    dealRows.forEach(r=>{
      const tr=el("tr");
      const pg=productGroup(r.product);
      const mkTd=(txt,align,style)=>{const td2=el("td");td2.style.textAlign=align||"right";if(style)Object.assign(td2.style,style);td2.textContent=txt||"";return td2;};
      tr.appendChild(mkTd(r.company||"—","left",{fontWeight:"600",color:"#020434",maxWidth:"150px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}));
      const ntd=mkTd("","left",{maxWidth:"240px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"});ntd.title=r.dealName||"";ntd.textContent=r.dealName||"—";tr.appendChild(ntd);
      tr.appendChild(mkTd(r.year,"right",{fontWeight:"700",color:"#020434"}));
      const ptd=el("td");ptd.style.cssText="text-align:left;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
      if(pg)ptd.innerHTML=`<span class="dot" style="background:${PRODUCT_COLORS[pg]||"#CBD5E1"}"></span>${pg}`;
      else ptd.innerHTML=`<span class="no-product">No product</span>`;
      tr.appendChild(ptd);
      const stTd=el("td");stTd.style.cssText="text-align:left;font-size:11px;color:#6b7280;white-space:nowrap";
      stTd.innerHTML=r.stage.replace(" (Deal Pipeline)","")+( r.isPipeline?` <span class="pipe-tag">Pipeline</span>`:"");
      tr.appendChild(stTd);
      const sdTd=el("td");sdTd.style.cssText="text-align:right;white-space:nowrap";
      sdTd.innerHTML=(r.startDate||r.closeDate||"—")+(r.dateFallback?` <span class="fallback-tag">Close Date</span>`:"");
      tr.appendChild(sdTd);
      tr.appendChild(mkTd(r.tcv>0?fmtFull(r.tcv):"—","right",{fontWeight:"700",color:"#020434"}));
      tr.appendChild(mkTd(r.inyr>0?fmtFull(r.inyr):"—","right"));
      dtbody.appendChild(tr);
    });
    dtbl.appendChild(dtbody);dscroll.appendChild(dtbl);dcard.appendChild(dscroll);main.appendChild(dcard);
  }

  // INSIGHTS
  if(state.activeTab==="summary"){
    const ins=el("div",{cls:"insights"});
    const itog=el("button",{cls:"insights-toggle",onClick:()=>setState({showInsights:!state.showInsights})});
    itog.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">✦</span><span>Key Business Insights & Takeaways</span></div><span style="opacity:.5;font-size:12px">${state.showInsights?"▲":"▼"}</span>`;
    ins.appendChild(itog);
    if(state.showInsights){
      const ig=el("div",{cls:"insights-grid"});
      INSIGHTS.forEach(i=>{const ic=el("div",{cls:"insight-card"});ic.innerHTML=`<div class="insight-icon">${i.icon}</div><div class="insight-title">${i.title}</div><div class="insight-body">${i.body}</div>`;ig.appendChild(ic);});
      ins.appendChild(ig);
    }
    main.appendChild(ins);
  }
}

window.addEventListener("resize",()=>render());
render();
</script>
</body>
</html>
