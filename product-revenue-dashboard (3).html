<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Beghou Product Revenue Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI",sans-serif;background:#f7f8fc;min-height:100vh;color:#374151}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
.header{background:#020434;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{color:#fff;font-size:20px;font-weight:800;letter-spacing:-0.02em}
.header-sub{color:#EDF0FA;font-size:11px;opacity:0.4;margin-top:2px}
.header-eyebrow{color:#EDF0FA;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;opacity:.5}
.header-kpis{display:flex;gap:8px}
.header-kpi{background:rgba(237,240,250,.07);border-radius:10px;padding:8px 16px;text-align:center;min-width:110px}
.header-kpi-label{color:#EDF0FA;font-size:9px;opacity:.45;letter-spacing:.08em;text-transform:uppercase}
.header-kpi-val{color:#E60F65;font-size:17px;font-weight:800}
.header-kpi-sub{color:#EDF0FA;font-size:9px;opacity:.3;margin-top:1px}
.main{padding:20px 28px;max-width:1400px;margin:0 auto}
.filter-bar{background:#fff;border-radius:14px;padding:14px 20px;border:1px solid #e8eaf0;box-shadow:0 1px 3px rgba(2,4,52,.05);display:flex;flex-wrap:wrap;gap:10px 20px;align-items:flex-start;margin-bottom:20px}
.filter-section{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding-right:5px;margin-right:2px;white-space:nowrap;padding-top:5px}
.filter-pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;transition:all .12s;white-space:nowrap}
.pill:hover{opacity:.85}
.divider{width:1px;background:#e8eaf0;align-self:stretch;flex-shrink:0;margin:0 4px}
.tabs{display:flex;border-bottom:1px solid #e8eaf0;margin-bottom:20px}
.tab{padding:9px 20px;border:none;background:none;font-weight:700;font-size:13px;color:#9ca3af;border-bottom:2px solid transparent;transition:all .12s}
.tab.active{color:#020434;border-bottom-color:#E60F65}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:18px 22px;border:1px solid #e8eaf0;box-shadow:0 1px 3px rgba(2,4,52,.06);border-top:3px solid #E60F65}
.kpi-label{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:800;color:#020434;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.card{background:#fff;border-radius:14px;border:1px solid #e8eaf0;box-shadow:0 1px 4px rgba(2,4,52,.04);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px 12px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:800;color:#020434}
.card-sub{font-size:11px;color:#9ca3af;margin-top:2px}
.chart-wrap{padding:20px 16px 10px;overflow:hidden}
canvas{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:1}
th{padding:10px 13px;font-size:10px;font-weight:800;color:#9ca3af;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid #e8eaf0;background:#fafbff;cursor:pointer;user-select:none;white-space:nowrap}
th.active{color:#020434;background:#f8f9ff}
td{padding:9px 13px;border-bottom:1px solid #f3f4f6;color:#374151}
tr:nth-child(even){background:#fafbff}
tr:hover td{background:#f0f4ff}
.dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:7px;vertical-align:middle;flex-shrink:0}
.no-product{background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700}
.pos{color:#00875A;font-weight:700}
.neg{color:#EF4444;font-weight:700}
.new-tag{color:#9ca3af}
.dash{color:#d1d5db}
.search-input{padding:7px 14px;border-radius:8px;border:1.5px solid #e8eaf0;font-size:12px;outline:none;width:240px;color:#374151}
.search-input:focus{border-color:#020434}
.table-scroll{overflow-x:auto;max-height:600px;overflow-y:auto}
.insights{background:#020434;border-radius:14px;overflow:hidden;margin-bottom:20px}
.insights-toggle{width:100%;background:none;border:none;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;color:#fff}
.insights-toggle span{font-weight:800;font-size:14px}
.insights-grid{padding:0 22px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.insight-card{background:rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;border:1px solid rgba(255,255,255,.08)}
.insight-icon{font-size:18px;margin-bottom:6px}
.insight-title{color:#E60F65;font-weight:800;font-size:12px;margin-bottom:5px}
.insight-body{color:#EDF0FA;font-size:11px;line-height:1.6;opacity:.72}
.untagged-banner{background:#fff;border-radius:14px;border:2px solid #F59E0B;overflow:hidden;margin-bottom:20px}
.untagged-header{padding:16px 20px;background:#fffbeb;border-bottom:1px solid #fef3c7;display:flex;gap:12px;align-items:center}
.untagged-body{padding:14px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.untagged-yr{background:#fffbeb;border-radius:10px;padding:14px 16px;border:1px solid #fef3c7}
.legend-wrap{display:flex;flex-wrap:wrap;gap:6px 14px;padding:10px 16px 16px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#374151;font-weight:600}
</style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────
function fmt(n){if(!n)return"$0";if(n>=1e9)return"$"+(n/1e9).toFixed(1)+"B";if(n>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"K";return"$"+n.toFixed(0)}
function fmtFull(n){return n?"$"+n.toLocaleString("en-US",{maximumFractionDigits:0}):"—"}
function productGroup(p){if(!p)return"";const b=p.includes(":")?p.split(":")[0].trim():p;if(b.toUpperCase()==="ARC IC OPERATIONS")return"Arc IC Operations";return b}
function getVal(r,metric){if(metric==="unitprice")return(r.unitprice||0)>0?r.unitprice:r.tcv;return r[metric]||0}
function el(tag,attrs,children){const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="cls")e.className=v;else if(k==="html")e.innerHTML=v;else if(k==="style")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v)});if(children)([].concat(children)).forEach(c=>c&&e.appendChild(typeof c==="string"?document.createTextNode(c):c));return e}

// ── Filtering ─────────────────────────────────────────────────────────────
function getFiltered(){
  const sf = state.viewMode==="executed"?EXEC_STAGES:PIPE_STAGES;
  return RAW_DATA.filter(r=>{
    if(!sf.has(r.stage))return false;
    if(state.selectedAreas.length>0&&!state.selectedAreas.includes(r.solutionArea))return false;
    if(state.selectedFunctions.length>0&&!state.selectedFunctions.includes(r.function))return false;
    if(state.selectedProducts.length>0&&!state.selectedProducts.includes(productGroup(r.product)))return false;
    return true;
  });
}
function getUntagged(){
  const sf = state.viewMode==="executed"?EXEC_STAGES:PIPE_STAGES;
  return RAW_DATA.filter(r=>sf.has(r.stage)&&!r.product);
}
function getTagged(base){return base.filter(r=>r.product)}
function aggByProductYear(tagged){
  const m={};
  for(const r of tagged){
    const g=productGroup(r.product);if(!g)continue;
    if(!m[g])m[g]={"2025":0,"2026":0};
    m[g][r.year]=(m[g][r.year]||0)+getVal(r,state.metric);
  }
  return m;
}

// ── Chart ─────────────────────────────────────────────────────────────────
function drawChart(canvas,pym){
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=380;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const years=["2025","2026"];
  const pad={top:20,right:20,bottom:50,left:72};
  const chartW=W-pad.left-pad.right;
  const chartH=H-pad.top-pad.bottom;
  // compute stacks
  const stacks=years.map(y=>{
    const segs=[];let other=0;
    for(const [p,vals] of Object.entries(pym)){
      const v=vals[y]||0;
      if(TOP_PRODUCTS.includes(p))segs.push({name:p,val:v,col:PRODUCT_COLORS[p]||"#CBD5E1"});
      else other+=v;
    }
    segs.push({name:"Other",val:other,col:"#CBD5E1"});
    return{year:y,segs,total:segs.reduce((s,x)=>s+x.val,0)};
  });
  const maxVal=Math.max(...stacks.map(s=>s.total))*1.08||1;
  const barW=Math.min(chartW/years.length*0.55,100);
  const gap=(chartW/years.length-barW)/2;
  // grid lines
  ctx.strokeStyle="#f0f0f5";ctx.lineWidth=1;
  const ticks=5;
  for(let i=0;i<=ticks;i++){
    const y=pad.top+chartH-(chartH*i/ticks);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
    ctx.fillStyle="#9ca3af";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="right";
    ctx.fillText(fmt(maxVal*i/ticks),pad.left-6,y+3);
  }
  // bars
  stacks.forEach((stack,si)=>{
    const x=pad.left+si*(chartW/years.length)+gap;
    let baseY=pad.top+chartH;
    stack.segs.forEach(seg=>{
      if(seg.val<=0)return;
      const h=(seg.val/maxVal)*chartH;
      ctx.fillStyle=seg.col;
      ctx.fillRect(x,baseY-h,barW,h);
      baseY-=h;
    });
    // total label
    ctx.fillStyle="#020434";ctx.font="bold 11px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText(fmt(stack.total),x+barW/2,baseY-6);
    // x label
    ctx.fillStyle="#020434";ctx.font="bold 14px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText(stack.year,x+barW/2,pad.top+chartH+22);
  });
  // y axis line
  ctx.strokeStyle="#e8eaf0";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.left,pad.top);ctx.lineTo(pad.left,pad.top+chartH);ctx.stroke();
}

  p.textContent=label;
  if(active){p.style.background=c.a;p.style.color=c.t;p.style.borderColor=c.a;}
  return p;
}
function makeFilterSection(label,color,pills){
  const wrap=el("div",{cls:"filter-section"});
  const lbl=el("div",{cls:"filter-label"});
  lbl.textContent=label;lbl.style.color=FILTER_COLORS[color].a;
  lbl.style.borderRight="2px solid "+FILTER_COLORS[color].a+"44";
  const pillWrap=el("div",{cls:"filter-pills"});
  pills.forEach(p=>pillWrap.appendChild(p));
  wrap.appendChild(lbl);wrap.appendChild(pillWrap);
  return wrap;
}

  });
  hdr.appendChild(hLeft);hdr.appendChild(hRight);
  root.appendChild(hdr);

  const main=el("div",{cls:"main"});
  root.appendChild(main);

  // ── FILTER BAR ──
  const fb=el("div",{cls:"filter-bar"});

  // Status
  const statusPills=[
    makePill("Executed / Won",state.viewMode==="executed"&&!state.showUntagged,"status",()=>setState({viewMode:"executed",showUntagged:false})),
    makePill("Open Pipeline",state.viewMode==="pipeline"&&!state.showUntagged,"status",()=>setState({viewMode:"pipeline",showUntagged:false})),
    makePill("⚠ Untagged",state.showUntagged,"status",()=>setState({showUntagged:!state.showUntagged}))
  ];
  fb.appendChild(makeFilterSection("Status","status",statusPills));
  fb.appendChild(el("div",{cls:"divider"}));

  // Metric
  const metricPills=[
    makePill("TCV",state.metric==="tcv","metric",()=>setState({metric:"tcv"})),
    makePill("In-Year Rev",state.metric==="inyr","metric",()=>setState({metric:"inyr"})),
    makePill("Unit Price",state.metric==="unitprice","metric",()=>setState({metric:"unitprice"}))
  ];
  fb.appendChild(makeFilterSection("Metric","metric",metricPills));
  fb.appendChild(el("div",{cls:"divider"}));

  // Solution Area
  const areaPills=[makePill("All",state.selectedAreas.length===0,"area",()=>setState({selectedAreas:[]}))];
  SOLUTION_AREAS.forEach(o=>areaPills.push(makePill(o,state.selectedAreas.includes(o),"area",()=>{
    const s=state.selectedAreas.includes(o)?state.selectedAreas.filter(x=>x!==o):[...state.selectedAreas,o];
    setState({selectedAreas:s});
  })));
  fb.appendChild(makeFilterSection("Solution Area","area",areaPills));
  fb.appendChild(el("div",{cls:"divider"}));

  // Function
  const fnPills=[makePill("All",state.selectedFunctions.length===0,"fn",()=>setState({selectedFunctions:[]}))];
  FUNCTIONS.forEach(o=>fnPills.push(makePill(o,state.selectedFunctions.includes(o),"fn",()=>{
    const s=state.selectedFunctions.includes(o)?state.selectedFunctions.filter(x=>x!==o):[...state.selectedFunctions,o];
    setState({selectedFunctions:s});
  })));
  fb.appendChild(makeFilterSection("Function","fn",fnPills));
  fb.appendChild(el("div",{cls:"divider"}));

  // Product
  const prodPills=[makePill("All",state.selectedProducts.length===0,"product",()=>setState({selectedProducts:[]}))];
  ALL_PRODUCTS.forEach(o=>prodPills.push(makePill(o,state.selectedProducts.includes(o),"product",()=>{
    const s=state.selectedProducts.includes(o)?state.selectedProducts.filter(x=>x!==o):[...state.selectedProducts,o];
    setState({selectedProducts:s});
  })));
  fb.appendChild(makeFilterSection("Product","product",prodPills));
  main.appendChild(fb);

  // ── TABS ──
  const tabs=el("div",{cls:"tabs"});
  const dealCount=state.showUntagged?untagged.length:base.length;
  [["summary","📊 Summary"],["deals",`📋 Deal Detail (${dealCount.toLocaleString()} records)`]].forEach(([t,lbl])=>{
    const btn=el("button",{cls:"tab"+(state.activeTab===t?" active":""),onClick:()=>setState({activeTab:t})});
    btn.textContent=lbl;tabs.appendChild(btn);
  });
  main.appendChild(tabs);

  // ── SUMMARY TAB ──
  if(state.activeTab==="summary"&&!state.showUntagged){
    // KPIs
    const kpiGrid=el("div",{cls:"kpi-grid"});
    const kpis=[
      {label:"FY2025 Tagged Revenue",val:fmt(total25),sub:METRIC_LABELS[state.metric],accent:"#E60F65"},
      {label:"FY2026 Tagged Revenue",val:fmt(total26),sub:METRIC_LABELS[state.metric],accent:"#020434"},
      {label:"YoY Growth (Tagged)",val:pct!==null?(pct>=0?"+":"")+pct.toFixed(0)+"%":"—",sub:pct!==null?(pct>=0?"Growth":"Decline")+" vs FY2025":"No 2025 baseline",accent:pct>0?"#00875A":"#EF4444"},
      {label:"Untagged 2026 TCV",val:fmt(ut26),sub:"No product assigned",accent:"#F59E0B"}
    ];
    kpis.forEach(k=>{
      const c=el("div",{cls:"kpi-card"});
      c.style.borderTopColor=k.accent;
      c.innerHTML=`<div class="kpi-label">${k.label}</div><div class="kpi-val">${k.val}</div><div class="kpi-sub">${k.sub}</div>`;
      kpiGrid.appendChild(c);
    });
    main.appendChild(kpiGrid);

    // Chart card
    const chartCard=el("div",{cls:"card"});
    const chHdr=el("div",{cls:"card-header"});
    chHdr.innerHTML=`<div><div class="card-title">Product Revenue · Year-Over-Year</div><div class="card-sub">Stacked · ${METRIC_LABELS[state.metric]} · ${state.viewMode==="executed"?"SOW Executed & Won":"Open Pipeline"}</div></div>`;
    chartCard.appendChild(chHdr);
    const chartWrap=el("div",{cls:"chart-wrap"});
    const canvas=el("canvas");
    chartWrap.appendChild(canvas);
    // Legend
    const legendWrap=el("div",{cls:"legend-wrap"});
    const activeProd=CHART_PRODUCTS.filter(p=>["2025","2026"].some(y=>(pym[p]?.[y]||0)>0));
    activeProd.forEach(p=>{
      const item=el("div",{cls:"legend-item"});
      item.innerHTML=`<span class="dot" style="background:${PRODUCT_COLORS[p]||"#CBD5E1"}"></span>${p}`;
      legendWrap.appendChild(item);
    });
    chartCard.appendChild(chartWrap);chartCard.appendChild(legendWrap);
    main.appendChild(chartCard);
    // Draw after paint
    requestAnimationFrame(()=>drawChart(canvas,pym));

    // Product table
    const tcard=el("div",{cls:"card"});
    const rows=Object.entries(pym).map(([p,v])=>({product:p,v2025:v["2025"]||0,v2026:v["2026"]||0,total:(v["2025"]||0)+(v["2026"]||0),change:v["2025"]>0?((v["2026"]-v["2025"])/v["2025"]*100):null}));
    const ps=state.prodSort;
    rows.sort((a,b)=>{const d=ps.dir==="asc"?1:-1;if(ps.col==="product")return d*a.product.localeCompare(b.product);return d*(a[ps.col]-b[ps.col]);});
    const thdr=el("div",{cls:"card-header"});
    thdr.innerHTML=`<div><div class="card-title">Product Breakdown</div><div class="card-sub">Click headers to sort · ${rows.length} products</div></div>`;
    tcard.appendChild(thdr);
    const tscroll=el("div",{cls:"table-scroll"});
    const tbl=el("table");
    const thead=el("thead");
    const hrow=el("tr");
    [["product","Product","left"],["v2025","FY2025","right"],["v2026","FY2026","right"],["total","Total","right"],["change","YoY Δ","right"]].forEach(([c,l,align])=>{
      const th=el("th",{cls:ps.col===c?"active":""});
      th.style.textAlign=align;if(align==="left")th.style.paddingLeft="20px";
      th.innerHTML=l+(ps.col===c?(ps.dir==="asc"?" ↑":" ↓"):"");
      th.addEventListener("click",()=>setState({prodSort:{col:c,dir:ps.col===c&&ps.dir==="desc"?"asc":"desc"}}));
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);tbl.appendChild(thead);
    const tbody=el("tbody");
    rows.forEach(r=>{
      const tr=el("tr");
      const tc=el("td");tc.style.textAlign="left";tc.style.paddingLeft="20px";tc.style.fontWeight="600";tc.style.color="#020434";
      tc.innerHTML=`<span class="dot" style="background:${PRODUCT_COLORS[r.product]||"#CBD5E1"}"></span>${r.product}`;
      tr.appendChild(tc);
      [r.v2025,r.v2026].forEach(v=>{const td2=el("td");td2.style.textAlign="right";td2.innerHTML=v>0?fmtFull(v):`<span class="dash">—</span>`;tr.appendChild(td2);});
      const tt=el("td");tt.style.textAlign="right";tt.style.fontWeight="700";tt.style.color="#020434";tt.textContent=fmtFull(r.total);tr.appendChild(tt);
      const tc2=el("td");tc2.style.textAlign="right";
      if(r.change!==null)tc2.innerHTML=`<span class="${r.change>=0?"pos":"neg"}">${r.change>=0?"+":""}${r.change.toFixed(0)}%</span>`;
      else tc2.innerHTML=`<span class="new-tag">New</span>`;
      tr.appendChild(tc2);tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);tscroll.appendChild(tbl);tcard.appendChild(tscroll);main.appendChild(tcard);
  }

  // ── UNTAGGED SUMMARY ──
  if(state.activeTab==="summary"&&state.showUntagged){
    const banner=el("div",{cls:"untagged-banner"});
    const bHdr=el("div",{cls:"untagged-header"});
    bHdr.innerHTML=`<span style="font-size:22px">⚠️</span><div><div style="font-weight:800;font-size:14px;color:#92400e">Untagged Line Items — No Product Assigned</div><div style="font-size:12px;color:#a16207;margin-top:2px">FY2025: ${fmt(ut25)} · FY2026: ${fmt(ut26)} · Switch to Deal Detail tab to inspect individual records.</div></div>`;
    banner.appendChild(bHdr);
    const bBody=el("div",{cls:"untagged-body"});
    ["2025","2026"].forEach(y=>{
      const recs=untagged.filter(r=>r.year===y);
      const total=recs.reduce((s,r)=>s+r.tcv,0);
      const byStage={};recs.forEach(r=>{byStage[r.stage]=(byStage[r.stage]||0)+r.tcv;});
      const ycard=el("div",{cls:"untagged-yr"});
      let html=`<div style="font-weight:800;font-size:13px;color:#92400e;margin-bottom:8px">FY${y} Untagged</div><div style="font-size:22px;font-weight:800;color:#F59E0B;margin-bottom:6px">${fmt(total)}</div><div style="font-size:11px;color:#a16207">${recs.length} line items</div>`;
      Object.entries(byStage).forEach(([s,v])=>{html+=`<div style="display:flex;justify-content:space-between;font-size:11px;color:#92400e;margin-top:4px"><span>${s.replace(" (Deal Pipeline)","")}</span><span style="font-weight:700">${fmt(v)}</span></div>`;});
      ycard.innerHTML=html;bBody.appendChild(ycard);
    });
    banner.appendChild(bBody);main.appendChild(banner);
  }

  // ── DEAL DETAIL TAB ──
  if(state.activeTab==="deals"){
    const dealBase=state.showUntagged?untagged:base;
    const search=state.dealSearch.toLowerCase();
    let dealRows=search?dealBase.filter(r=>(r.dealName||"").toLowerCase().includes(search)||(r.company||"").toLowerCase().includes(search)||(productGroup(r.product)||"").toLowerCase().includes(search)):dealBase;
    const ds=state.dealSort;
    dealRows=[...dealRows];
    dealRows.sort((a,b)=>{const d=ds.dir==="asc"?1:-1;if(ds.col==="dealName")return d*(a.dealName||"").localeCompare(b.dealName||"");if(ds.col==="company")return d*(a.company||"").localeCompare(b.company||"");if(ds.col==="year")return d*a.year.localeCompare(b.year);if(ds.col==="product")return d*(productGroup(a.product)||"").localeCompare(productGroup(b.product)||"");return d*(a[ds.col]-b[ds.col]);});
    const dealTotal=dealRows.reduce((s,r)=>s+r.tcv,0);
    const dcard=el("div",{cls:"card"});
    const dHdr=el("div",{cls:"card-header"});
    const dHdrLeft=el("div");
    dHdrLeft.innerHTML=`<div class="card-title">${state.showUntagged?"⚠️ Untagged Line Items":"Deal Detail"}</div><div class="card-sub">${dealRows.length.toLocaleString()} records · ${fmtFull(dealTotal)} total TCV</div>`;
    const srch=el("input",{cls:"search-input",placeholder:"Search deal, company, product…"});
    srch.value=state.dealSearch;
    srch.addEventListener("input",e=>setState({dealSearch:e.target.value}));
    dHdr.appendChild(dHdrLeft);dHdr.appendChild(srch);dcard.appendChild(dHdr);
    const dscroll=el("div",{cls:"table-scroll"});
    const dtbl=el("table");
    const dthead=el("thead");
    const dhrow=el("tr");
    [["company","Company","left"],["dealName","Deal Name","left"],["year","Year","right"],["product","Product","left"],["stage","Stage","left"],["tcv","TCV","right"],["inyr","In-Yr Rev","right"]].forEach(([c,l,align])=>{
      const th=el("th",{cls:ds.col===c?"active":""});
      th.style.textAlign=align;if(align==="left")th.style.paddingLeft="13px";
      th.innerHTML=l+(ds.col===c?(ds.dir==="asc"?" ↑":" ↓"):"");
      th.addEventListener("click",()=>setState({dealSort:{col:c,dir:ds.col===c&&ds.dir==="desc"?"asc":"desc"}}));
      dhrow.appendChild(th);
    });
    dthead.appendChild(dhrow);dtbl.appendChild(dthead);
    const dtbody=el("tbody");
    dealRows.forEach(r=>{
      const tr=el("tr");
      const pg=productGroup(r.product);
      const mkTd=(txt,align,extra)=>{const td2=el("td");td2.style.textAlign=align||"right";if(extra)Object.assign(td2.style,extra);td2.textContent=txt||"";return td2;};
      const ctd=mkTd(r.company||"—","left",{fontWeight:"600",color:"#020434",maxWidth:"160px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"});tr.appendChild(ctd);
      const ntd=mkTd("","left",{maxWidth:"260px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"});ntd.title=r.dealName||"";ntd.textContent=r.dealName||"—";tr.appendChild(ntd);
      const ytd=mkTd(r.year,"right",{fontWeight:"700",color:"#020434"});tr.appendChild(ytd);
      const ptd=el("td");ptd.style.textAlign="left";ptd.style.maxWidth="200px";ptd.style.overflow="hidden";ptd.style.textOverflow="ellipsis";ptd.style.whiteSpace="nowrap";
      if(pg)ptd.innerHTML=`<span class="dot" style="background:${PRODUCT_COLORS[pg]||"#CBD5E1"}"></span>${pg}`;
      else ptd.innerHTML=`<span class="no-product">No product</span>`;
      tr.appendChild(ptd);
      const stTd=mkTd(r.stage.replace(" (Deal Pipeline)",""),"left",{fontSize:"11px",color:"#6b7280"});tr.appendChild(stTd);
      const tvTd=mkTd(r.tcv>0?fmtFull(r.tcv):"—","right",{fontWeight:"700",color:"#020434"});tr.appendChild(tvTd);
      const irTd=mkTd(r.inyr>0?fmtFull(r.inyr):"—","right");tr.appendChild(irTd);
      dtbody.appendChild(tr);
    });
    dtbl.appendChild(dtbody);dscroll.appendChild(dtbl);dcard.appendChild(dscroll);main.appendChild(dcard);
  }

  // ── INSIGHTS ──
  if(state.activeTab==="summary"){
    const ins=el("div",{cls:"insights"});
    const itog=el("button",{cls:"insights-toggle",onClick:()=>setState({showInsights:!state.showInsights})});
    itog.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">✦</span><span>Key Business Insights & Takeaways</span></div><span style="opacity:.5;font-size:12px">${state.showInsights?"▲":"▼"}</span>`;
    ins.appendChild(itog);
    if(state.showInsights){
      const ig=el("div",{cls:"insights-grid"});
      INSIGHTS.forEach(i=>{
        const ic=el("div",{cls:"insight-card"});
        ic.innerHTML=`<div class="insight-icon">${i.icon}</div><div class="insight-title">${i.title}</div><div class="insight-body">${i.body}</div>`;
        ig.appendChild(ic);
      });
      ins.appendChild(ig);
    }
    main.appendChild(ins);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
window.addEventListener("resize",()=>render());
render();
</script>
</body>
</html>
